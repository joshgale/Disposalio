name: Data Sync

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 18 * * *' # 4:00 AM AEST (18:00 UTC)
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c("fitzRoy", "dplyr", "jsonlite", "tidyr", "remotes"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Fetch AFL Data
        run: Rscript scripts/get_afl_data.R

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/players.json
          git commit -m "Update player disposal data [skip ci]" || echo "No changes to commit"
          git push
